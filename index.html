<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>崩壞：星穹鐵道 限定卡池模擬器</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --container-bg: #222222;
            --primary-color: #dfb241;
            --primary-hover: #f1c40f;
            --text-main: #e0e0e0;
            --text-muted: #999999;
            --border-color: #333333;
            --input-bg: #2b2b2b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--container-bg);
            border-radius: 8px;
            padding: 40px 50px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px 25px;
        }

        .col-1 { grid-column: span 1; }
        .col-2 { grid-column: span 2; }
        .col-3 { grid-column: span 3; }
        .col-4 { grid-column: span 4; }
        .col-center-4 { grid-column: 2 / 6; }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        input[type="number"], select {
            background-color: var(--input-bg);
            border: 1px solid transparent;
            color: var(--text-main);
            padding: 12px 14px;
            border-radius: 4px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #333333;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .button-group {
            margin-top: 10px;
        }

        button {
            background-color: var(--primary-color);
            color: #111;
            border: none;
            padding: 14px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
            color: #888;
        }

        #result-area {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid var(--border-color);
            display: none;
        }

        .summary-box {
            background-color: rgba(223, 178, 65, 0.08);
            border-left: 4px solid var(--primary-color);
            padding: 16px 20px;
            margin-bottom: 25px;
            border-radius: 0 4px 4px 0;
        }

        .summary-box p {
            margin: 6px 0;
            color: #ccc;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            background-color: var(--input-bg);
            margin-bottom: 10px;
            border-radius: 4px;
            border: 1px solid transparent;
        }

        .result-row.target-met {
            border-color: var(--primary-color);
            background-color: rgba(223, 178, 65, 0.05);
        }

        .result-label {
            font-weight: 500;
            color: #ddd;
        }

        .result-value {
            font-family: monospace;
            font-size: 1.15rem;
            color: var(--primary-color);
            font-weight: bold;
        }

        .footer-note {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 25px;
        }
        
        .loading-text {
            text-align: center;
            color: var(--primary-color);
            font-size: 1.1rem;
            margin: 30px 0;
            display: none;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .col-1, .col-2, .col-3, .col-4, .col-center-4 {
                grid-column: span 6;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>限定卡池模擬器</h1>
    
    <div class="grid">
        <div class="form-group col-3">
            <label>當前星瓊數量</label>
            <input type="number" id="jades" value="0" min="0">
        </div>
        <div class="form-group col-3">
            <label>當前星軌專票數量</label>
            <input type="number" id="passes" value="0" min="0">
        </div>

        <div class="form-group col-2">
            <label>目標限定角色數量</label>
            <input type="number" id="targetChars" value="1" min="0">
        </div>
        <div class="form-group col-2">
            <label>角色池已墊抽數 (0-89)</label>
            <input type="number" id="charPity" value="0" min="0" max="89">
        </div>
        <div class="form-group col-2">
            <label>角色池下次是否為大保底</label>
            <select id="charGuar">
                <option value="false">否</option>
                <option value="true">是</option>
            </select>
        </div>

        <div class="form-group col-2">
            <label>目標限定光錐數量</label>
            <input type="number" id="targetWeaps" value="0" min="0">
        </div>
        <div class="form-group col-2">
            <label>光錐池已墊抽數 (0-79)</label>
            <input type="number" id="weapPity" value="0" min="0" max="79">
        </div>
        <div class="form-group col-2">
            <label>光錐池下次是否為大保底</label>
            <select id="weapGuar">
                <option value="false">否</option>
                <option value="true">是</option>
            </select>
        </div>

        <div class="form-group col-3">
            <label>UP 四星是否全滿命</label>
            <select id="fullC6" onchange="toggleEidolonInputs()">
                <option value="true">是</option>
                <option value="false">否</option>
            </select>
        </div>
        <div class="form-group col-1 eidolon-group" style="display:none;">
            <label>角色A命座</label>
            <input type="number" id="e1" value="0" min="0" max="6">
        </div>
        <div class="form-group col-1 eidolon-group" style="display:none;">
            <label>角色B命座</label>
            <input type="number" id="e2" value="0" min="0" max="6">
        </div>
        <div class="form-group col-1 eidolon-group" style="display:none;">
            <label>角色C命座</label>
            <input type="number" id="e3" value="0" min="0" max="6">
        </div>

        <div class="form-group col-center-4">
            <label>模擬次數 (建議 10000 ~ 1000000)</label>
            <input type="number" id="simulations" value="100000" min="1000">
        </div>

        <div class="form-group col-center-4 button-group">
            <button id="runBtn" onclick="startSimulation()">開始模擬</button>
        </div>
    </div>
    
    <div id="loading" class="loading-text">資料運算中，請稍候...</div>

    <div id="result-area">
        <div class="summary-box" id="summary"></div>
        <div id="details"></div>
        <div class="footer-note" id="footer-note"></div>
    </div>
</div>

<script>
    function toggleEidolonInputs() {
        const fullC6 = document.getElementById('fullC6').value === 'true';
        const groups = document.querySelectorAll('.eidolon-group');
        groups.forEach(g => g.style.display = fullC6 ? 'none' : 'flex');
    }

    function singlePullCharacter(pity, isGuaranteed) {
        pity++;
        let prob = pity <= 73 ? 0.006 : 0.006 + 0.06 * (pity - 73);
        if (Math.random() < prob || pity >= 90) {
            if (isGuaranteed || Math.random() < 0.5) {
                return { gotUp: true, gotStd: false, newPity: 0, newGuar: false };
            } else {
                return { gotUp: false, gotStd: true, newPity: 0, newGuar: true };
            }
        }
        return { gotUp: false, gotStd: false, newPity: pity, newGuar: isGuaranteed };
    }

    function singlePullWeapon(pity, isGuaranteed) {
        pity++;
        let prob = pity <= 65 ? 0.008 : 0.008 + 0.07 * (pity - 65);
        if (Math.random() < prob || pity >= 80) {
            if (isGuaranteed || Math.random() < 0.75) {
                return { gotUp: true, gotStd: false, newPity: 0, newGuar: false };
            } else {
                return { gotUp: false, gotStd: true, newPity: 0, newGuar: true };
            }
        }
        return { gotUp: false, gotStd: false, newPity: pity, newGuar: isGuaranteed };
    }

    function runSingleSimulation(totalPulls, charPity, charGuar, weapPity, weapGuar, targetChars, targetWeaps, fullC6, initEidolons) {
        let pullsLeft = totalPulls;
        let charsGot = 0;
        let weapsGot = 0;
        let fourStarPity = 0;
        let refundFragments = 0.0;
        let currentCharPity = charPity;
        let currentCharGuar = charGuar;
        let currentWeapPity = weapPity;
        let currentWeapGuar = weapGuar;
        let currentEidolons = [...initEidolons];

        while (pullsLeft > 0 && (charsGot < targetChars || weapsGot < targetWeaps)) {
            pullsLeft--;
            fourStarPity++;
            let gotFiveStar = false;

            if (charsGot < targetChars) {
                let res = singlePullCharacter(currentCharPity, currentCharGuar);
                currentCharPity = res.newPity;
                currentCharGuar = res.newGuar;
                if (res.gotUp) { charsGot++; gotFiveStar = true; }
                if (res.gotStd) { pullsLeft += 2; gotFiveStar = true; }
            } else {
                let res = singlePullWeapon(currentWeapPity, currentWeapGuar);
                currentWeapPity = res.newPity;
                currentWeapGuar = res.newGuar;
                if (res.gotUp) { weapsGot++; gotFiveStar = true; }
                if (res.gotStd) { pullsLeft += 2; gotFiveStar = true; }
            }
            
            if (!gotFiveStar) {
                if (Math.random() < 0.051 || fourStarPity >= 10) {
                    fourStarPity = 0;
                    if (Math.random() < 0.5) { // UP 四星
                        let idx = Math.floor(Math.random() * 3);
                        if (fullC6 || currentEidolons[idx] >= 6) {
                            pullsLeft += 1; // 滿命回1抽
                        } else {
                            currentEidolons[idx]++;
                            refundFragments += 0.4;
                        }
                    } else { // 其他四星
                        refundFragments += 0.4;
                    }
                    if (refundFragments >= 1.0) {
                        pullsLeft++;
                        refundFragments -= 1.0;
                    }
                }
            }
        }
        return { c: charsGot, w: weapsGot };
    }

    function startSimulation() {
        const btn = document.getElementById('runBtn');
        const loading = document.getElementById('loading');
        const resultArea = document.getElementById('result-area');
        btn.disabled = true;
        btn.innerText = "運算中...";
        resultArea.style.display = 'none';
        loading.style.display = 'block';

        const jades = parseInt(document.getElementById('jades').value) || 0;
        const passes = parseInt(document.getElementById('passes').value) || 0;
        const charPity = parseInt(document.getElementById('charPity').value) || 0;
        const charGuar = document.getElementById('charGuar').value === 'true';
        const targetChars = parseInt(document.getElementById('targetChars').value) || 0;
        const targetWeaps = parseInt(document.getElementById('targetWeaps').value) || 0;
        const weapPity = parseInt(document.getElementById('weapPity').value) || 0;
        const weapGuar = document.getElementById('weapGuar').value === 'true';
        const simulations = parseInt(document.getElementById('simulations').value) || 100000;
        const fullC6 = document.getElementById('fullC6').value === 'true';
        const initEidolons = [
            parseInt(document.getElementById('e1').value) || 0,
            parseInt(document.getElementById('e2').value) || 0,
            parseInt(document.getElementById('e3').value) || 0
        ];

        const initialPulls = Math.floor(jades / 160) + passes;

        setTimeout(() => {
            const outcomesTally = {};
            for (let i = 0; i < simulations; i++) {
                let res = runSingleSimulation(initialPulls, charPity, charGuar, weapPity, weapGuar, targetChars, targetWeaps, fullC6, initEidolons);
                let key = `${res.c},${res.w}`;
                outcomesTally[key] = (outcomesTally[key] || 0) + 1;
            }
            renderResults(outcomesTally, simulations, initialPulls, targetChars, targetWeaps);
            btn.disabled = false;
            btn.innerText = "開始模擬";
            loading.style.display = 'none';
            resultArea.style.display = 'block';
        }, 50);
    }

    function renderResults(outcomes, totalSims, pulls, tC, tW) {
        document.getElementById('summary').innerHTML = `
            <p>初始總抽數：<strong>${pulls} 抽</strong></p>
            <p>測試次數：<strong>${totalSims.toLocaleString()} 次</strong></p>
            <p>目標策略：優先抽滿角色 <strong>${tC}</strong> 隻，再抽光錐 <strong>${tW}</strong> 把</p>
        `;
        const detailsDiv = document.getElementById('details');
        detailsDiv.innerHTML = '';
        const sortedKeys = Object.keys(outcomes).sort((a, b) => {
            let [ac, aw] = a.split(',').map(Number);
            let [bc, bw] = b.split(',').map(Number);
            return ac !== bc ? ac - bc : aw - bw;
        });
        let totalRate = 0;
        sortedKeys.forEach(key => {
            let [c, w] = key.split(',').map(Number);
            let rate = (outcomes[key] / totalSims) * 100;
            if (rate >= 0.01) {
                totalRate += rate;
                let isTargetMet = (c === tC && w === tW);
                let row = document.createElement('div');
                row.className = `result-row ${isTargetMet ? 'target-met' : ''}`;
                row.innerHTML = `<span class="result-label">${isTargetMet ? `圓滿達成目標 ${c} + ${w}` : `資源抽乾，停在 ${c} + ${w}`}</span><span class="result-value">${rate.toFixed(2)}%</span>`;
                detailsDiv.appendChild(row);
            }
        });
        document.getElementById('footer-note').innerText = `總計顯示機率涵蓋率: ${totalRate.toFixed(2)}% (未滿 100% 為隱藏了極低機率的防呆設計)`;
    }
</script>

</body>
</html>
